templates:
  - pattern: SemanticAttributes.java.j2
    filter: '.groups | map(select(.type == "attribute_group")) | map(select(.id | startswith("registry"))) | map(select(.attributes[] | contains(.stability="stable"))) | group_by(.id | split(".") | .[1]) | map({id: .[0].id | split(".") | .[1], attributes: .[].attributes})'
    application_mode: each


# Space delimited list of root namespaces to excluded (i.e. "foo bar")
#        "-Dexcluded_namespaces=\"ios aspnetcore signalr\"",
#"-Dfilter=${filter}",
#        "-DclassPrefix=${classPrefix}",
#        "-Dpkg=$packageNameArg",
#        "-DstablePkg=$stablePackageNameArg"